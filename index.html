<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Aster Bay — City Builder</title>
<style>
  :root{
    --panel:#1c2030e6; --ink:#f4ede0; --dim:#b9b3a6; --accent:#ffce6b;
    --good:#67d18a; --bad:#ff6b5e;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-user-select:none; user-select:none;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0f24;
    font-family: ui-rounded,'SF Pro Rounded','Segoe UI',system-ui,sans-serif;}
  canvas{display:block;width:100vw;height:100vh;cursor:grab;touch-action:none;}
  canvas.dragging{cursor:grabbing;}
  canvas.building{cursor:crosshair;}

  .hud{
    position:fixed; top:14px; left:14px; background:var(--panel); color:var(--ink);
    border-radius:14px; padding:12px 16px 12px; backdrop-filter:blur(8px);
    box-shadow:0 6px 24px #0008; min-width:208px; pointer-events:none;
    border:1px solid #ffffff14;
  }
  .hud h1{font-size:15px; letter-spacing:3px; color:var(--accent); font-weight:800; margin-bottom:2px;}
  .hud .sub{font-size:10px; letter-spacing:1.5px; color:var(--dim); text-transform:uppercase; margin-bottom:8px;}
  #cash{font-size:20px; font-weight:800; color:var(--good); letter-spacing:.5px;}
  #cash.broke{color:var(--bad);}
  #clock{font-size:18px; font-weight:800; letter-spacing:1px; margin-top:4px;}
  #phase{font-size:11px; color:var(--accent); letter-spacing:1px; margin-bottom:7px;}
  .stat{display:flex; justify-content:space-between; gap:18px; font-size:12.5px; padding:2px 0;}
  .stat .k{color:var(--dim);}
  .stat .v{font-variant-numeric:tabular-nums; font-weight:700;}
  .bars{margin-top:8px; border-top:1px solid #ffffff14; padding-top:7px;}
  .brow{display:flex; align-items:center; gap:8px; padding:2px 0;}
  .brow .bl{font-size:10px; width:14px; color:var(--dim); font-weight:800;}
  .btrack{flex:1; height:6px; background:#ffffff14; border-radius:4px; overflow:hidden;}
  .bfill{height:100%; border-radius:4px; transition:width .4s;}
  #dR .bfill{background:#67d18a;} #dC .bfill{background:#4f9dde;} #dG .bfill{background:#a3c9a8;}

  .tools{
    position:fixed; left:14px; top:50%; transform:translateY(-42%);
    display:flex; flex-direction:column; gap:6px;
    background:var(--panel); padding:9px; border-radius:16px;
    backdrop-filter:blur(8px); box-shadow:0 6px 24px #0008; border:1px solid #ffffff14;
  }
  .tools button{
    appearance:none; border:none; cursor:pointer; color:var(--ink);
    background:#ffffff10; border-radius:11px; padding:7px 10px;
    display:flex; align-items:center; gap:9px; min-width:128px;
    font:700 12.5px ui-rounded,'SF Pro Rounded','Segoe UI',sans-serif;
    transition:background .15s, transform .08s; text-align:left;
  }
  .tools button .ico{font-size:16px; width:20px; text-align:center;}
  .tools button small{display:block; font-size:10px; color:var(--dim); font-weight:600;}
  .tools button:hover{background:#ffffff22;}
  .tools button:active{transform:scale(.96);}
  .tools button.on{background:var(--accent); color:#23201a;}
  .tools button.on small{color:#23201ab0;}
  .tools .gap{height:4px; border-top:1px solid #ffffff18; margin:3px 2px;}
  .tools button:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .bar{
    position:fixed; left:50%; bottom:16px; transform:translateX(-50%);
    display:flex; gap:8px; align-items:center;
    background:var(--panel); padding:9px 11px; border-radius:16px;
    backdrop-filter:blur(8px); box-shadow:0 6px 24px #0008; border:1px solid #ffffff14;
  }
  .bar button{
    appearance:none; border:none; cursor:pointer; color:var(--ink);
    background:#ffffff12; border-radius:10px; padding:8px 13px;
    font:700 13px ui-rounded,'SF Pro Rounded','Segoe UI',sans-serif;
    transition:background .15s, transform .08s;
  }
  .bar button:hover{background:#ffffff24;}
  .bar button:active{transform:scale(.94);}
  .bar button.on{background:var(--accent); color:#23201a;}
  .bar .sep{width:1px; height:22px; background:#ffffff22;}
  .bar button:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .palette{
    position:fixed; left:170px; top:50%; transform:translateY(-42%);
    display:none; flex-direction:column; gap:6px;
    background:var(--panel); padding:8px; border-radius:14px;
    backdrop-filter:blur(8px); box-shadow:0 6px 24px #0008; border:1px solid #ffffff14;
  }
  .palette.show{display:flex;}
  .palette button{
    width:30px; height:30px; border-radius:9px; border:2px solid transparent;
    cursor:pointer; transition:transform .08s;
  }
  .palette button:active{transform:scale(.9);}
  .palette button.on{border-color:var(--ink); box-shadow:0 0 0 2px #00000055 inset;}
  @media (max-width:760px){
    .palette{
      left:50%; top:auto; bottom:calc(118px + env(safe-area-inset-bottom));
      transform:translateX(-50%); flex-direction:row; max-width:96vw; overflow-x:auto;
    }
  }
  #tip{
    position:fixed; pointer-events:none; background:#15182ae8; color:var(--ink);
    border:1px solid #ffffff1c; padding:6px 10px; border-radius:10px;
    font-size:12px; display:none; z-index:9; white-space:nowrap;
    box-shadow:0 4px 14px #0009;
  }
  #tip b{color:var(--accent);}

  #toasts{position:fixed; left:50%; transform:translateX(-50%); bottom:74px;
    display:flex; flex-direction:column-reverse; gap:6px; align-items:center; pointer-events:none; z-index:8;}
  .toast{background:#15182af0; color:var(--ink); border:1px solid #ffffff1c;
    padding:7px 14px; border-radius:12px; font-size:12.5px; font-weight:700;
    box-shadow:0 4px 14px #0009; animation:tin .25s ease, tout .4s ease 2.4s forwards;}
  .toast.err{color:var(--bad);} .toast.ok{color:var(--good);}
  @keyframes tin{from{opacity:0; transform:translateY(8px);}}
  @keyframes tout{to{opacity:0; transform:translateY(-6px);}}

  .hint{
    position:fixed; right:14px; bottom:16px; color:#ffffff66; font-size:11px;
    letter-spacing:.5px; text-align:right; line-height:1.5; pointer-events:none;
  }
  @media (max-width:760px){
    .hint{display:none;}
    .hud{min-width:0; padding:8px 12px 9px; transform:scale(.9); transform-origin:top left;}
    .hud .stat{font-size:11.5px;}
    #cash{font-size:17px;} #clock{font-size:15px;}
    .tools{
      top:auto; left:50%; bottom:calc(64px + env(safe-area-inset-bottom));
      transform:translateX(-50%); flex-direction:row; max-width:96vw;
      overflow-x:auto; overscroll-behavior:contain; padding:7px; gap:5px;
    }
    .tools button{min-width:0; padding:10px 12px;}
    .tools button .lbl{display:none;}
    .tools .gap{width:1px; height:auto; align-self:stretch; border-top:none;
      border-left:1px solid #ffffff18; margin:2px 3px;}
    .bar{bottom:calc(10px + env(safe-area-inset-bottom)); padding:7px 9px;}
    .bar button{padding:9px 12px;}
  }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div class="hud">
  <h1>ASTER BAY</h1>
  <div class="sub" id="rank">hamlet · mayor mode v0.5</div>
  <div id="cash">$25,000</div>
  <div id="clock">08:00</div>
  <div id="phase">Morning · Day 1</div>
  <div class="stat"><span class="k">Population</span><span class="v" id="sPop">0</span></div>
  <div class="stat"><span class="k">Jobs</span><span class="v" id="sJobs">0</span></div>
  <div class="stat"><span class="k">Happiness</span><span class="v" id="sHap">—</span></div>
  <div class="stat"><span class="k">Vehicles on road</span><span class="v" id="sCars">0</span></div>
  <div class="bars">
    <div class="brow" id="dR"><span class="bl">R</span><div class="btrack"><div class="bfill" style="width:40%"></div></div></div>
    <div class="brow" id="dC"><span class="bl">C</span><div class="btrack"><div class="bfill" style="width:40%"></div></div></div>
    <div class="brow" id="dG"><span class="bl">G</span><div class="btrack"><div class="bfill" style="width:40%"></div></div></div>
  </div>
</div>

<div class="tools" role="toolbar" aria-label="Build tools">
  <button id="bMode"><span class="ico">🎮</span><span class="lbl" id="modeLbl">Mayor mode<small>tap for creative</small></span></button>
  <div class="gap"></div>
  <button class="tool on" data-t="inspect"><span class="ico">🖐</span><span class="lbl">Inspect<small>hover the city</small></span></button>
  <div class="gap"></div>
  <button class="tool" data-t="road"><span class="ico">🛣️</span><span class="lbl">Road<small>$120 · must touch a road</small></span></button>
  <button class="tool" data-t="house"><span class="ico">🏠</span><span class="lbl">Housing<small>$500 · needs a sidewalk</small></span></button>
  <button class="tool" data-t="shop"><span class="ico">🏬</span><span class="lbl">Shop<small>$900 · needs a sidewalk</small></span></button>
  <button class="tool" data-t="fire"><span class="ico">🚒</span><span class="lbl">Fire station<small>$1,200 · douses fires nearby</small></span></button>
  <button class="tool" data-t="school"><span class="ico">🏫</span><span class="lbl">School<small>$800 · happier residents</small></span></button>
  <button class="tool" data-t="park"><span class="ico">🌿</span><span class="lbl">Park<small>$200</small></span></button>
  <button class="tool" data-t="tree"><span class="ico">🌳</span><span class="lbl">Tree<small>$40</small></span></button>
  <button class="tool" data-t="block"><span class="ico">🧱</span><span class="lbl">Blocks<small>$25 · tap to stack</small></span></button>
  <button class="tool" data-t="dozer"><span class="ico">💥</span><span class="lbl">Bulldoze<small>$50</small></span></button>
  <div class="gap"></div>
  <button id="bEvents"><span class="ico">🔥</span><span class="lbl" id="evLbl">Fires: on<small>random events</small></span></button>
  <button id="bSave"><span class="ico">💾</span><span class="lbl">Export save<small>.json</small></span></button>
  <button id="bLoad"><span class="ico">📂</span><span class="lbl">Import save<small>.json</small></span></button>
  <input type="file" id="fileIn" accept=".json,application/json" style="display:none">
</div>

<div class="palette" id="palette" aria-label="Block colors"></div>

<div class="bar" role="toolbar" aria-label="Simulation controls">
  <button id="bPause" title="Pause / resume (Space)">⏸ Pause</button>
  <span class="sep"></span>
  <button class="spd on" data-s="1">1×</button>
  <button class="spd" data-s="2">2×</button>
  <button class="spd" data-s="4">4×</button>
  <span class="sep"></span>
  <button id="bOut" title="Zoom out (−)">−</button>
  <button id="bIn" title="Zoom in (+)">＋</button>
  <button id="bHome" title="Recenter view">⌖</button>
</div>

<div id="tip"></div>
<div id="toasts"></div>
<div class="hint">pick a tool · click a tile to build · blocks stack!<br>the world goes on forever — pave a road and see<br>drag to pan · scroll to zoom · Esc to inspect</div>

<script>
'use strict';
/* ============================ ASTER BAY v0.2 ============================
   Playable isometric city builder. Vanilla JS, one file, zero deps.
   Systems: dynamic road graph, traffic lights, pedestrians, day/night,
   economy (cash, daily taxes/upkeep), RCG demand, build/bulldoze,
   JSON export/import (ready to swap for Supabase later).
   ======================================================================= */

// ---------- canvas ----------
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
let DPR = 1, CW = 0, CH = 0;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  CW = window.innerWidth; CH = window.innerHeight;
  cv.width = CW * DPR; cv.height = CH * DPR;
}
window.addEventListener('resize', resize); resize();

// ---------- rng / helpers ----------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const R = mulberry32(20260611);
const rand=(a,b)=>a+R()*(b-a), pick=arr=>arr[(R()*arr.length)|0];
const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a,b)=>v<a?a:v>b?b:v;
const smooth=t=>t*t*(3-2*t);
function hash(x,y,z){let h=x*374761393+y*668265263+z*2147483647;h=(h^(h>>13))*1274126177;return ((h^(h>>16))>>>0)/4294967296;}
function hex2rgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
const rgbCache = new Map();
function rgbOf(h){let v=rgbCache.get(h); if(!v){v=hex2rgb(h); rgbCache.set(h,v);} return v;}
function mixRGB(a,b,t){return [lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t)];}
function css(c){return `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;}

// ---------- world constants ----------
const GRID = 33;                  // 0..32; original city core sits at 4..28
const CORE0 = 4, CORE1 = 28;      // fringe meadow around the core is buildable
const TW = 34, TH = 17;
const STORY = 13;
const DAY_LEN = 150;              // real seconds per in-game day at 1×
const inB=()=>true;                // the world is unbounded now
const isCoreLine = i => i>=CORE0 && i<=CORE1 && (i-CORE0)%6===0;
const tkey=(x,y)=>x+','+y;

function iso(x,y,z){ return { x:(x-y)*TW, y:(x+y)*TH - (z||0) }; }

// ---------- infinite world: procedural terrain + edits overlay ----------
// Terrain is deterministic from coordinates (meadow / forest / lakes).
// Anything the city or player changes lives in `edits` — the world is
// terrain everywhere else, forever, in all directions.
const edits=new Map();          // "x,y" -> tile type override
const removedTrees=new Set();   // forest trees that were bulldozed
const terrainMemo=new Map();
function ihash(x,y,s){ // proper 32-bit mix — the visual hash() loses precision on big coords
  let h = Math.imul(x|0,374761393) ^ Math.imul(y|0,668265263) ^ Math.imul(s|0,974711);
  h = Math.imul(h ^ (h>>>13), 1274126177);
  h ^= h>>>16;
  return (h>>>0)/4294967296;
}
function noise2(x,y,s){
  const xi=Math.floor(x), yi=Math.floor(y), u=smooth(x-xi), v=smooth(y-yi);
  return lerp(lerp(ihash(xi,yi,s),ihash(xi+1,yi,s),u),
              lerp(ihash(xi,yi+1,s),ihash(xi+1,yi+1,s),u), v);
}
function terrainAt(x,y){
  const cd=Math.max(Math.abs(x-16),Math.abs(y-16));   // distance from old town
  const e=noise2(x*0.085,y*0.085,21)*0.65 + noise2(x*0.21,y*0.21,22)*0.35;
  const w=e + Math.max(0,(26-cd))*0.022;              // dry land near town
  if(w<0.31) return 'water';
  if(cd>16 && e>0.62) return 'forest';                // open meadow ring, then woods
  return 'grass';
}
function tileAt(x,y){
  const k=tkey(x,y);
  const e=edits.get(k); if(e) return e;
  let t=terrainMemo.get(k);
  if(t===undefined){ t=terrainAt(x,y); terrainMemo.set(k,t); }
  return t;
}
function setTile(x,y,t){ edits.set(tkey(x,y), t); }
function clearTile(x,y){ edits.delete(tkey(x,y)); }
function hasProcTree(x,y){
  return tileAt(x,y)==='forest' && !removedTrees.has(tkey(x,y)) && hash(x,y,31)<0.85;
}
// seed the original town: roads + sidewalk/lot blocks at tiles 4..28
for(let x=0;x<GRID;x++) for(let y=0;y<GRID;y++){
  const rx = isCoreLine(x) && y>=CORE0 && y<=CORE1;
  const ry = isCoreLine(y) && x>=CORE0 && x<=CORE1;
  if(rx&&ry) setTile(x,y,'xing');
  else if(rx||ry) setTile(x,y,'road');
}
for(let bx=0;bx<4;bx++) for(let by=0;by<4;by++){
  const x0=CORE0+bx*6+1, y0=CORE0+by*6+1;
  for(let dx=0;dx<5;dx++) for(let dy=0;dy<5;dy++){
    const x=x0+dx, y=y0+dy;
    setTile(x,y,(dx===0||dy===0||dx===4||dy===4)?'walk':'lot');
  }
}
const isRoadT = t => t==='road'||t==='xing';
const roadAt=(x,y)=> isRoadT(tileAt(x,y));

// ---------- registries ----------
const buildings=[], trees=[], lamps=[], benches=[], blocks=[];
const bldMap=new Map(), treeMap=new Map(), blockMap=new Map(), parkSet=new Set();
let fountain=null;
function addBuilding(b){ buildings.push(b); bldMap.set(tkey(b.x,b.y), b); }
function addTree(t){ t.tx=Math.floor(t.x); t.ty=Math.floor(t.y);
  trees.push(t); treeMap.set(tkey(t.tx,t.ty), t); }
function removeBuildingAt(x,y){
  const b=bldMap.get(tkey(x,y)); if(!b) return false;
  buildings.splice(buildings.indexOf(b),1); bldMap.delete(tkey(x,y)); return true;
}
function removeTreeAt(x,y){
  const t=treeMap.get(tkey(x,y)); if(!t) return false;
  trees.splice(trees.indexOf(t),1); treeMap.delete(tkey(x,y)); return true;
}

// ---------- city generation ----------
const PASTELS = ['#ee9b8f','#f3cf7a','#a3c9a8','#8fb3c7','#c9a8d4','#f1e3c8','#e8b07a','#9fc4bd'];
const ROOFRED = ['#c25b4e','#a8553f','#8f6b4e','#b06a52'];
const AWNINGS = ['#e2574c','#4f9dde','#67b56b','#b06fc4','#f2a93b'];
const PARK_BLOCK='1,2', PLAZA_BLOCK='2,1', TOWER_BLOCK='1,1';

function makeBuilding(x,y,stories,opts){
  opts=opts||{};
  const use = opts.use || (stories<=2 ? 'res' : (R()<.55?'res':'com'));
  const b={x,y,h:stories*STORY+(opts.exactH?0:rand(0,6)),stories,use,
    kind:opts.kind||null,
    color:opts.color||pick(PASTELS), inset:opts.inset!=null?opts.inset:rand(.08,.16),
    seed:hash(x,y,3), landmark:!!opts.landmark,
    capacity: use==='res'? stories*6 : 0,
    jobs: use==='com'? stories*12 : (use==='civic'? (opts.kind==='fire'?8:12) : (opts.landmark?80:0)),
    roof:'flat', roofCol:pick(ROOFRED), awn:pick(AWNINGS), fire:null};
  if(!b.landmark && use!=='civic'){
    if(use==='res'&&stories<=2) b.roof='pitch';
    else if(R()<.3) b.roof='unit';
    else if(R()<.25) b.roof='garden';
  }
  return b;
}

for(let bx=0;bx<4;bx++) for(let by=0;by<4;by++){
  const key=bx+','+by, x0=CORE0+bx*6+1, y0=CORE0+by*6+1;

  if(key===PARK_BLOCK){
    for(let dx=0;dx<5;dx++) for(let dy=0;dy<5;dy++){
      setTile(x0+dx,y0+dy,'grass'); parkSet.add(tkey(x0+dx,y0+dy));
    }
    for(let dx=0;dx<5;dx++) for(let dy=0;dy<5;dy++){
      if(hash(x0+dx,y0+dy,7)<0.55 && !(dx===2&&dy===2))
        addTree({x:x0+dx+rand(.3,.7), y:y0+dy+rand(.3,.7), s:rand(.8,1.3)});
    }
    setTile(x0+2,y0+2,'water');
    continue;
  }
  if(key===PLAZA_BLOCK){
    fountain={x:x0+2.5, y:y0+2.5};
    for(let dx=1;dx<4;dx++) for(let dy=1;dy<4;dy++) setTile(x0+dx,y0+dy,'walk');
    [[.5,.5],[4.5,.5],[.5,4.5],[4.5,4.5]].forEach(([a,b])=>addTree({x:x0+a,y:y0+b,s:1}));
    benches.push({x:x0+1.5,y:y0+3.6},{x:x0+3.5,y:y0+1.4});
    continue;
  }
  const cdist=Math.hypot(bx-1.5,by-1.5);
  for(let dx=1;dx<4;dx++) for(let dy=1;dy<4;dy++){
    const x=x0+dx, y=y0+dy;
    if(key===TOWER_BLOCK&&dx===2&&dy===2){
      addBuilding(makeBuilding(x,y,11,{landmark:true,color:'#dfe6ef',inset:.06,exactH:true,use:'com'}));
      continue;
    }
    if(R()<0.84){
      const maxS=clamp(8-cdist*2.6,2,8);
      addBuilding(makeBuilding(x,y,1+((R()*maxS)|0)));
    } else {
      setTile(x,y,'grass');
      if(R()<.8) addTree({x:x+rand(.3,.7),y:y+rand(.3,.7),s:rand(.7,1.1)});
    }
  }
}
// streetlamps + sidewalk planters
for(let x=0;x<GRID;x++) for(let y=0;y<GRID;y++){
  if(tileAt(x,y)!=='walk') continue;
  if(!(roadAt(x-1,y)||roadAt(x+1,y)||roadAt(x,y-1)||roadAt(x,y+1))) continue;
  if((x*3+y*5)%7===0) lamps.push({x:x+0.5, y:y+0.5});
  else if(hash(x,y,11)<0.08 && !treeMap.has(tkey(x,y))) addTree({x:x+0.5,y:y+0.5,s:0.65});
}

// ---------- traffic lights (dynamic) ----------
let INTERS=[];
const CYCLE=22, GREEN=8.4, YEL=2.6;
function roadDegree(x,y){
  let n=0; if(roadAt(x-1,y))n++; if(roadAt(x+1,y))n++; if(roadAt(x,y-1))n++; if(roadAt(x,y+1))n++;
  return n;
}
function refreshXingAt(x,y){
  if(!roadAt(x,y)) return;
  const nx=(roadAt(x-1,y)?1:0)+(roadAt(x+1,y)?1:0);
  const ny=(roadAt(x,y-1)?1:0)+(roadAt(x,y+1)?1:0);
  setTile(x,y,(nx>0&&ny>0)?'xing':'road');
}
function rebuildLights(){
  INTERS=[];
  for(const [k,t] of edits){
    if(t!=='xing') continue;
    const [x,y]=k.split(',').map(Number);
    if(roadDegree(x,y)>=3) INTERS.push({x,y,phase:(x*7+y*13)%12});
  }
}
rebuildLights();
function lightState(inter, clock){
  const u=(clock+inter.phase)%CYCLE;
  if(u<GREEN)       return {ns:'g', ew:'r'};
  if(u<GREEN+YEL)   return {ns:'y', ew:'r'};
  if(u<2*GREEN+YEL) return {ns:'r', ew:'g'};
  return                   {ns:'r', ew:'y'};
}
const interAt=(x,y)=>INTERS.find(i=>i.x===x&&i.y===y);
const xingAt=(x,y)=> tileAt(x,y)==='xing';

// ---------- cars ----------
const DIRS=[[1,0],[-1,0],[0,1],[0,-1]];
const cars=[];
function roadNeighbors(x,y){
  const out=[];
  for(const d of DIRS) if(roadAt(x+d[0],y+d[1])) out.push(d);
  return out;
}
function spawnCar(){
  for(let tries=0;tries<60;tries++){
    const spot=randomEditTile('road'); if(!spot) return false;
    const [x,y]=spot;
    const dirs=roadNeighbors(x,y);
    if(!dirs.length) continue;
    const d=pick(dirs);
    cars.push({fx:x,fy:y,tx:x+d[0],ty:y+d[1],p:R(),dx:d[0],dy:d[1],pdx:d[0],pdy:d[1],
      speed:rand(1.7,2.4), color:pick(['#e2574c','#f2a93b','#4f9dde','#67b56b','#b06fc4','#ef8fb2','#f4f1ea','#46c2b2']),
      name:CARNAMES[carI%CARNAMES.length]+(carI>=CARNAMES.length?' '+(1+(carI/CARNAMES.length|0)):''),
      kind:pick(CARKIND), wait:0, sx:0, sy:0});
    carI++; return true;
  }
  return false;
}
const occ=new Map();
const occKey=(x,y,dx,dy)=>x+','+y+','+dx+','+dy;
function updateCars(dt, clock){
  occ.clear();
  for(const c of cars) occ.set(occKey(c.tx,c.ty,c.dx,c.dy), c);
  for(const c of cars){
    c.p += dt*c.speed*(c.wait>0?0:1);
    c.wait=Math.max(0,c.wait-dt);
    if(c.p<1) continue;
    const x=c.tx, y=c.ty;
    let dirs=roadNeighbors(x,y).filter(d=>!(d[0]===-c.dx&&d[1]===-c.dy));
    if(!dirs.length) dirs=[[-c.dx,-c.dy]];
    const nd=(dirs.some(d=>d[0]===c.dx&&d[1]===c.dy)&&R()<0.62)?[c.dx,c.dy]:pick(dirs);
    const nx=x+nd[0], ny=y+nd[1];
    const inter=interAt(nx,ny);
    if(inter){
      const st=lightState(inter,clock);
      const axis=nd[1]!==0?st.ns:st.ew;
      if(axis!=='g'){ c.p=1; c.wait=0.15; continue; }
    }
    const k=occKey(nx,ny,nd[0],nd[1]);
    if(occ.has(k)&&occ.get(k)!==c){ c.p=1; c.wait=0.12; continue; }
    occ.delete(occKey(c.tx,c.ty,c.dx,c.dy));
    c.fx=x;c.fy=y;c.tx=nx;c.ty=ny;
    c.pdx=c.dx;c.pdy=c.dy;c.dx=nd[0];c.dy=nd[1];
    c.p-=1;
    occ.set(occKey(nx,ny,nd[0],nd[1]),c);
  }
}
function carPos(c){
  const LANE=0.21;
  const ox1=-c.pdy*LANE, oy1=c.pdx*LANE, ox2=-c.dy*LANE, oy2=c.dx*LANE;
  const t=clamp(c.p*2,0,1);
  return {x:lerp(c.fx,c.tx,c.p)+0.5+lerp(ox1,ox2,t), y:lerp(c.fy,c.ty,c.p)+0.5+lerp(oy1,oy2,t)};
}

// ---------- pedestrians ----------
const peds=[];
const inCore=(x,y)=>x>=CORE0&&x<=CORE1&&y>=CORE0&&y<=CORE1;
const isWalkable=(x,y)=>{
  const t=tileAt(x,y);
  return t==='walk' || (t==='grass' && (inCore(x,y)||parkSet.has(tkey(x,y))));
};
function pedMoves(x,y){
  const out=[];
  for(const d of DIRS){
    const nx=x+d[0], ny=y+d[1];
    if(isWalkable(nx,ny)) out.push({x:nx,y:ny,steps:1,d});
    else if(tileAt(nx,ny)==='road'){
      const cx=x+2*d[0], cy=y+2*d[1];
      const xwalk=xingAt(nx-1,ny)||xingAt(nx+1,ny)||xingAt(nx,ny-1)||xingAt(nx,ny+1);
      if(xwalk&&isWalkable(cx,cy)) out.push({x:cx,y:cy,steps:2,d});
    }
  }
  return out;
}
function spawnPed(){
  for(let tries=0;tries<80;tries++){
    const spot=randomEditTile('walk'); if(!spot) return false;
    const [x,y]=spot;
    peds.push({fx:x,fy:y,tx:x,ty:y,p:1,steps:1,d:[1,0],
      ox:rand(-.22,.22),oy:rand(-.22,.22),
      speed:rand(.55,.95), idle:rand(0,2), bob:R()*9,
      shirt:pick(['#e2574c','#f2a93b','#4f9dde','#67b56b','#b06fc4','#ef8fb2','#46c2b2','#f4f1ea','#7d6ddc']),
      skin:pick(['#f4cba6','#e3a87c','#c98a5e','#9c6b43','#7a5236']),
      name:FIRST[nameI%FIRST.length]+(nameI>=FIRST.length?' Jr.':''),
      flavor:pick(PEDFLAVOR), sx:0, sy:0});
    nameI++; return true;
  }
  return false;
}
function updatePeds(dt){
  for(const p of peds){
    if(p.idle>0){ p.idle-=dt; continue; }
    p.p += dt*p.speed/p.steps;
    if(p.p<1) continue;
    p.fx=p.tx; p.fy=p.ty; p.p=0;
    if(R()<0.06) p.idle=rand(.5,3);
    const moves=pedMoves(p.fx,p.fy);
    if(!moves.length){ p.idle=1; p.steps=1; p.tx=p.fx; p.ty=p.fy; continue; }
    const fwd=moves.find(m=>m.d[0]===p.d[0]&&m.d[1]===p.d[1]);
    const m=(fwd&&R()<0.55)?fwd:pick(moves);
    p.tx=m.x; p.ty=m.y; p.steps=m.steps; p.d=m.d;
  }
}
const pedPos=p=>({x:lerp(p.fx,p.tx,p.p)+0.5+p.ox, y:lerp(p.fy,p.ty,p.p)+0.5+p.oy});

// ---------- economy & demand ----------
let cash=25000, day=1;
const COST={road:120,house:500,shop:900,park:200,tree:40,dozer:50,fire:1200,school:800,block:25};
const stats={pop:0,cap:0,jobs:0,happy:.7,green:0,dR:.4,dC:.4,dG:.4};
function recompute(){
  let cap=0, jobs=0;
  for(const b of buildings){ cap+=b.capacity; jobs+=b.jobs; }
  let grass=0;
  for(const t of edits.values()) if(t==='grass'||t==='water') grass++;
  const green=trees.length + grass*1.5;
  const greenScore=clamp(green/(cap/6+40),0,1);
  const jobScore=clamp(jobs/(cap*0.55+1),0,1);
  stats.cap=cap; stats.jobs=jobs; stats.green=greenScore;
  let covered=0, resB=0;
  for(const b of buildings) if(b.use==='res'){ resB++; if(coveredBy('school',b.x,b.y)) covered++; }
  const eduBonus = resB ? 0.15*(covered/resB) : 0;
  stats.happy=clamp(0.25+0.45*greenScore+0.2*jobScore+eduBonus,0.15,1);
  stats.pop=Math.round(cap*(0.45+0.55*stats.happy));
  stats.dR=clamp((jobs*1.1-stats.pop*0.6)/(cap*0.5+200)+0.45,0.04,1);
  stats.dC=clamp((stats.pop*0.8-jobs)/(stats.pop*0.6+200)+0.4,0.04,1);
  stats.dG=clamp(1-greenScore,0.04,1);
}
function roadCount(){
  let n=0;
  for(const t of edits.values()) if(isRoadT(t)) n++;
  return n;
}
function adjustAgents(){
  const pt=clamp(Math.round(stats.pop/12),18,240);
  const ct=clamp(Math.round(stats.pop/45),8,70);
  while(peds.length<pt) if(!spawnPed()) break;
  while(peds.length>pt) peds.pop();
  while(cars.length<ct) if(!spawnCar()) break;
  while(cars.length>ct) cars.pop();
}
function economyTick(){
  if(mode==='creative'){ adjustAgents(); return; }
  const income=Math.round(stats.pop*2 + stats.jobs*1.5);
  const civic=stationsOf('fire').length*120 + stationsOf('school').length*90;
  const upkeep=Math.round(roadCount()*6 + lamps.length*2 + civic);
  cash += income-upkeep;
  toast(`Day ${day}: +$${income.toLocaleString()} taxes · −$${upkeep.toLocaleString()} upkeep`, income>=upkeep?'ok':'err');
  adjustAgents();
}

// ---------- civic coverage · fires · milestones ----------
let eventsOn=true, fireRollT=0;
const scorch=new Set();
const FIRE_R=7, SCHOOL_R=6;
function stationsOf(kind){ return buildings.filter(b=>b.use==='civic'&&b.kind===kind); }
function coveredBy(kind,x,y){
  const Rr=kind==='fire'?FIRE_R:SCHOOL_R;
  return stationsOf(kind).some(s=>Math.hypot(s.x-x,s.y-y)<=Rr);
}
function igniteAt(b){
  if(!b||b.fire||b.landmark||(b.use==='civic'&&b.kind==='fire')) return;
  b.fire={t:0,covered:coveredBy('fire',b.x,b.y),spreadT:0};
  toast(b.fire.covered?'🔥 Fire! Crews are already rolling':'🔥 Fire! No station in range…', b.fire.covered?'ok':'err');
}
function updateFires(sdt){
  if(eventsOn && mode!=='creative'){
    fireRollT+=sdt;
    const HOUR=DAY_LEN/24;
    while(fireRollT>HOUR){
      fireRollT-=HOUR;
      if(R()<clamp(buildings.length*0.0009,0.02,0.12)) igniteAt(pick(buildings));
    }
  }
  for(let i=buildings.length-1;i>=0;i--){
    const b=buildings[i];
    if(!b.fire) continue;
    b.fire.t+=sdt;
    b.fire.covered=coveredBy('fire',b.x,b.y);
    if(b.fire.covered && b.fire.t>4){
      b.fire=null; toast('Fire out — nice coverage, Mayor','ok'); continue;
    }
    if(!b.fire.covered){
      b.fire.spreadT+=sdt;
      if(b.fire.spreadT>3){
        b.fire.spreadT=0;
        if(R()<0.3){
          const n=[bldMap.get(tkey(b.x+1,b.y)),bldMap.get(tkey(b.x-1,b.y)),
                   bldMap.get(tkey(b.x,b.y+1)),bldMap.get(tkey(b.x,b.y-1))].filter(Boolean);
          if(n.length) igniteAt(pick(n));
        }
      }
      if(b.fire.t>12){
        scorch.add(tkey(b.x,b.y));
        removeBuildingAt(b.x,b.y);
        toast('💥 Building lost to fire','err');
        recompute();
      }
    }
  }
}
const RANKS=[[0,'Hamlet'],[500,'Village'],[1200,'Town'],[2500,'City'],[4500,'Metropolis']];
let rankIdx=0;
function checkMilestones(){
  let idx=0;
  for(let i=0;i<RANKS.length;i++) if(stats.pop>=RANKS[i][0]) idx=i;
  if(idx>rankIdx){
    rankIdx=idx;
    const bonus=2000*idx;
    cash+=bonus;
    toast(`🎉 ${RANKS[idx][1]} status! Council grant: +$${bonus.toLocaleString()}`,'ok');
  } else if(idx<rankIdx) rankIdx=idx;
}

// ---------- build tools ----------
let tool='inspect', hoverTile=null;
let mode='mayor';                            // 'mayor' | 'creative'
const BLOCK_H=10, MAX_STACK=14;
const BLOCK_COLORS=['#e2574c','#f2a93b','#ffd23e','#67b56b','#46c2b2','#4f9dde','#7d6ddc','#ef8fb2','#f4f1ea','#5a5f6b'];
let blockColor=BLOCK_COLORS[5];
function randomEditTile(type){
  const spots=[];
  for(const [k,t] of edits) if(t===type) spots.push(k);
  if(!spots.length) return null;
  return spots[(R()*spots.length)|0].split(',').map(Number);
}
function emptyGroundType(t){ return t==='lot'||t==='grass'||t==='forest'; }
function tileFree(x,y){
  const k=tkey(x,y);
  return !bldMap.has(k) && !treeMap.has(k) && !blockMap.has(k) && !hasProcTree(x,y);
}
function nearWalkOrRoad(x,y){
  for(let dx=-2;dx<=2;dx++) for(let dy=-2;dy<=2;dy++){
    if(Math.abs(dx)+Math.abs(dy)>2||(dx===0&&dy===0)) continue;
    const nx=x+dx, ny=y+dy;
    const t=tileAt(nx,ny);
    if(t==='walk'||isRoadT(t)) return true;
  }
  return false;
}
function canPlace(t,x,y){
  const ty=tileAt(x,y), k=tkey(x,y);
  switch(t){
    case 'road':  return (emptyGroundType(ty)||ty==='walk') && !bldMap.has(k) && !blockMap.has(k)
                         && roadNeighbors(x,y).length>0;   // trees auto-felled
    case 'house':
    case 'shop':
    case 'fire':
    case 'school': return emptyGroundType(ty) && tileFree(x,y) && nearWalkOrRoad(x,y);
    case 'park':  return (ty==='lot'||((ty==='grass'||ty==='forest')&&!parkSet.has(k))) && tileFree(x,y);
    case 'tree':  return emptyGroundType(ty) && tileFree(x,y);
    case 'block': return blockMap.has(k) ? blockMap.get(k).colors.length<MAX_STACK
                         : (emptyGroundType(ty) && tileFree(x,y));
    case 'dozer': return blockMap.has(k) || bldMap.has(k) || treeMap.has(k)
                         || (ty==='grass'&&edits.has(k)) || hasProcTree(x,y) || scorch.has(k);
    default: return false;
  }
}
function spend(n){
  if(mode==='creative') return true;
  if(cash<n){ toast(`Not enough cash — need $${n}`, 'err'); return false; }
  cash-=n; return true;
}
const costTxt=n=> mode==='creative' ? '' : ' · −$'+n;
function tryPlace(x,y){
  if(tool==='inspect') return;
  if(!canPlace(tool,x,y)){
    if(tool==='road') toast('Roads must touch an existing road','err');
    else if(tool==='house'||tool==='shop'||tool==='fire'||tool==='school') toast('Needs an empty lot next to a sidewalk or road','err');
    else if(tool==='dozer') toast('Nothing to clear here (roads are permanent — ordinance 12)','err');
    else if(tool==='block') toast('Blocks need open ground (max '+MAX_STACK+' high)','err');
    else toast('Can\u2019t build there','err');
    return;
  }
  switch(tool){
    case 'road': {
      if(!spend(COST.road)) return;
      removeTreeAt(x,y); removedTrees.add(tkey(x,y));
      setTile(x,y,'road');
      refreshXingAt(x,y);
      for(const d of DIRS) refreshXingAt(x+d[0],y+d[1]);
      for(const d of DIRS){ // grow sidewalks alongside
        const nx=x+d[0], ny=y+d[1];
        const nt=tileAt(nx,ny);
        if((nt==='lot'||nt==='grass'||nt==='forest')&&!bldMap.has(tkey(nx,ny))&&!treeMap.has(tkey(nx,ny))&&!hasProcTree(nx,ny)&&!parkSet.has(tkey(nx,ny))&&!blockMap.has(tkey(nx,ny)))
          setTile(nx,ny,'walk');
      }
      rebuildLights();
      toast('Road paved · −$'+COST.road,'ok');
      break;
    }
    case 'house': {
      if(!spend(COST.house)) return;
      addBuilding(makeBuilding(x,y,1+((R()*3)|0),{use:'res'}));
      toast('New housing · −$'+COST.house,'ok');
      break;
    }
    case 'shop': {
      if(!spend(COST.shop)) return;
      addBuilding(makeBuilding(x,y,1+((R()*2)|0),{use:'com'}));
      toast('Shop opened · −$'+COST.shop,'ok');
      break;
    }
    case 'fire':
    case 'school': {
      if(!spend(COST[tool])) return;
      addBuilding(makeBuilding(x,y,2,{use:'civic',kind:tool,exactH:true,inset:.1,
        color:tool==='fire'?'#d6453c':'#f3cf7a'}));
      toast((tool==='fire'?'Fire station built':'School built')+' · −$'+COST[tool],'ok');
      break;
    }
    case 'park': {
      if(!spend(COST.park)) return;
      setTile(x,y,'grass'); parkSet.add(tkey(x,y));
      if(R()<.7) addTree({x:x+rand(.3,.7),y:y+rand(.3,.7),s:rand(.8,1.2)});
      toast('Park planted · −$'+COST.park,'ok');
      break;
    }
    case 'tree': {
      if(!spend(COST.tree)) return;
      addTree({x:x+rand(.3,.7),y:y+rand(.3,.7),s:rand(.7,1.2)});
      toast('Tree planted · −$'+COST.tree,'ok');
      break;
    }
    case 'block': {
      if(!spend(COST.block)) return;
      const k=tkey(x,y);
      if(blockMap.has(k)){
        const bk=blockMap.get(k);
        bk.colors.push(blockColor);
        toast('Block stacked · '+bk.colors.length+' high'+costTxt(COST.block), 'ok');
      } else {
        const bk={x,y,colors:[blockColor]}; blocks.push(bk); blockMap.set(k,bk);
        toast('Block placed'+costTxt(COST.block), 'ok');
      }
      break;
    }
    case 'dozer': {
      if(!spend(COST.dozer)) return;
      const k=tkey(x,y);
      if(blockMap.has(k)){
        const bk=blockMap.get(k);
        bk.colors.pop();
        if(!bk.colors.length){ blocks.splice(blocks.indexOf(bk),1); blockMap.delete(k); }
      }
      else if(removeBuildingAt(x,y)) toast('Building demolished','ok');
      else if(removeTreeAt(x,y)) toast('Tree removed','ok');
      else if(tileAt(x,y)==='grass'&&edits.has(k)){
        if(inCore(x,y)) setTile(x,y,'lot'); else clearTile(x,y);
        parkSet.delete(k);
        toast('Park cleared','ok');
      }
      else if(hasProcTree(x,y)){ removedTrees.add(k); toast('Tree felled','ok'); }
      else if(scorch.has(k)) toast('Rubble cleared','ok');
      break;
    }
  }
  scorch.delete(tkey(x,y));
  recompute();
}

let simClock=0, paused=false, speed=1;

function hourNow(){ return (START_HOUR + simClock*(24/DAY_LEN)) % 24; }
const SKY=[
  [0,'#070b1d','#141d3a'],[4.5,'#0c1330','#272a52'],[6,'#33406f','#e98e6a'],
  [7.5,'#7cb9e6','#ffe7ba'],[11,'#6db8ea','#d4ecf6'],[15,'#68b0e6','#d2e9f3'],
  [17.5,'#6f9fd8','#ffd9a0'],[19,'#3d4486','#ff8e5e'],[20.5,'#11183a','#2c2c55'],

];
function skyAt(h){
  for(let i=0;i<SKY.length-1;i++){
    if(h>=SKY[i][0]&&h<=SKY[i+1][0]){
      const t=smooth((h-SKY[i][0])/(SKY[i+1][0]-SKY[i][0]));
      return [css(mixRGB(rgbOf(SKY[i][1]),rgbOf(SKY[i+1][1]),t)),
              css(mixRGB(rgbOf(SKY[i][2]),rgbOf(SKY[i+1][2]),t))];
    }
  }
  return [SKY[0][1],SKY[0][2]];
}
const NIGHT_K=[[0,1],[4.7,1],[7,0],[17.2,0],[19.8,1],[24,1]];
function nightAt(h){
  for(let i=0;i<NIGHT_K.length-1;i++)
    if(h>=NIGHT_K[i][0]&&h<=NIGHT_K[i+1][0])
      return lerp(NIGHT_K[i][1],NIGHT_K[i+1][1],
        smooth((h-NIGHT_K[i][0])/(NIGHT_K[i+1][0]-NIGHT_K[i][0])));
  return 1;
}
const bell=(h,c,w)=>Math.exp(-((h-c)*(h-c))/(2*w*w));
let night=0, warm=0, ambKey='';
const NIGHT_RGB=[22,30,62], WARM_RGB=[255,166,96];
const shadeCache=new Map();
function shade(hexCol, light){
  const key=hexCol+'|'+((light*24)|0)+'|'+ambKey;
  let v=shadeCache.get(key);
  if(v) return v;
  const b=rgbOf(hexCol);
  let c=[b[0]*light,b[1]*light,b[2]*light];
  c=mixRGB(c,NIGHT_RGB,night*0.66);
  c=mixRGB(c,WARM_RGB,warm*0.16);
  v=css(c); shadeCache.set(key,v);
  return v;
}
const stars=[]; for(let i=0;i<110;i++) stars.push({x:R(),y:R()*0.62,s:rand(.6,1.8),tw:R()*9});
const clouds=[]; for(let i=0;i<6;i++) clouds.push({x:R()*1.4-0.2,y:rand(.06,.3),s:rand(.6,1.4),v:rand(.004,.012)});

// ---------- camera ----------
const center=iso(GRID/2,GRID/2,0);
const cam={px:0, py:40, z: Math.min(CW,CH)>700?1.05:0.7};
function applyCam(){
  ctx.translate(CW/2+cam.px, CH/2+cam.py);
  ctx.scale(cam.z,cam.z);
  ctx.translate(-center.x,-center.y);
}
function worldToScreen(wx,wy){
  return {x:(wx-center.x)*cam.z+CW/2+cam.px, y:(wy-center.y)*cam.z+CH/2+cam.py};
}
function screenToTile(mx,my){
  const wx=(mx-CW/2-cam.px)/cam.z+center.x;
  const wy=(my-CH/2-cam.py)/cam.z+center.y;
  return {x:Math.floor(wx/(2*TW)+wy/(2*TH)), y:Math.floor(wy/(2*TH)-wx/(2*TW))};
}

// ---------- drawing primitives ----------
function quad(p1,p2,p3,p4,fill){
  ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
  ctx.lineTo(p3.x,p3.y); ctx.lineTo(p4.x,p4.y); ctx.closePath();
  ctx.fillStyle=fill; ctx.fill();
}
function diamond(x,y,z,fill){
  quad(iso(x,y,z),iso(x+1,y,z),iso(x+1,y+1,z),iso(x,y+1,z),fill);
}

// ---------- ground ----------
function visibleRange(){
  const inv=(sx,sy)=>{
    const wx=(sx-CW/2-cam.px)/cam.z+center.x;
    const wy=(sy-CH/2-cam.py)/cam.z+center.y;
    return {x:wx/(2*TW)+wy/(2*TH), y:wy/(2*TH)-wx/(2*TW)};
  };
  const c=[inv(0,0),inv(CW,0),inv(0,CH),inv(CW,CH)];
  let x0=Math.floor(Math.min(c[0].x,c[1].x,c[2].x,c[3].x))-3;
  let x1=Math.ceil (Math.max(c[0].x,c[1].x,c[2].x,c[3].x))+12;
  let y0=Math.floor(Math.min(c[0].y,c[1].y,c[2].y,c[3].y))-3;
  let y1=Math.ceil (Math.max(c[0].y,c[1].y,c[2].y,c[3].y))+12;
  if(x1-x0>150){ const m=(x0+x1)/2; x0=Math.floor(m-75); x1=Math.ceil(m+75); }
  if(y1-y0>150){ const m=(y0+y1)/2; y0=Math.floor(m-75); y1=Math.ceil(m+75); }
  return {x0,x1,y0,y1};
}
function drawGround(rng, animT){
  for(let x=rng.x0;x<=rng.x1;x++) for(let y=rng.y0;y<=rng.y1;y++){
    const t=tileAt(x,y);
    if(t==='road'||t==='xing'){
      diamond(x,y,0, shade('#565b68',1));
    } else if(t==='walk'){
      diamond(x,y,0, shade(((x+y)&1)?'#d9d3c2':'#d2ccba',1));
    } else if(t==='grass'){
      diamond(x,y,0, shade(hash(x,y,5)<.5?'#8cc47b':'#83bd72',1));
    } else if(t==='forest'){
      diamond(x,y,0, shade(hash(x,y,5)<.5?'#79b169':'#71a861',1));
    } else if(t==='lot'){
      diamond(x,y,0, shade('#b9b3a2',1));
    } else if(t==='water'){
      diamond(x,y,0, shade('#5fb6d9',1));
      if(hash(x,y,13)<0.2){ // sparse shimmer so big lakes stay cheap
        const c=iso(x+0.5,y+0.5,0), r=6+Math.sin(animT*2+x*1.7+y*2.3)*2;
        ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.ellipse(c.x,c.y,r,r*0.5,0,0,Math.PI*2); ctx.stroke();
      }
    }
    if(scorch.has(tkey(x,y))) diamond(x,y,0,'rgba(35,28,25,.55)');
  }
  // road furniture: roads only exist as edits, so iterate those
  ctx.lineWidth=1.6;
  for(const [k,t] of edits){
    if(t!=='road') continue;
    const [x,y]=k.split(',').map(Number);
    if(x<rng.x0||x>rng.x1||y<rng.y0||y>rng.y1) continue;
    const vert = roadAt(x,y-1)||roadAt(x,y+1);
    const byXing = xingAt(x-1,y)||xingAt(x+1,y)||xingAt(x,y-1)||xingAt(x,y+1);
    if(byXing){
      ctx.strokeStyle='rgba(244,241,230,.78)'; ctx.lineWidth=2.6;
      for(let kk=0;kk<4;kk++){
        const u=0.2+kk*0.2;
        const a=vert?iso(x+0.12,y+u):iso(x+u,y+0.12);
        const b=vert?iso(x+0.88,y+u):iso(x+u,y+0.88);
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      }
      ctx.lineWidth=1.6;
    } else {
      ctx.strokeStyle='rgba(244,241,230,.4)';
      const a=vert?iso(x+0.5,y+0.18):iso(x+0.18,y+0.5);
      const b=vert?iso(x+0.5,y+0.55):iso(x+0.55,y+0.5);
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    }
  }
}
// deterministic forest trees (drawn via the sorted item list)
function procTreeObj(x,y){
  return { x:x+0.25+hash(x,y,41)*0.5, y:y+0.25+hash(x,y,42)*0.5,
           s:0.8+hash(x,y,43)*0.6 };
}

// ---------- elevated objects ----------
function drawBuilding(b, animT){
  const i=b.inset, x0=b.x+i, x1=b.x+1-i, y0=b.y+i, y1=b.y+1-i, h=b.h;
  quad(iso(x0,y1,h),iso(x1,y1,h),iso(x1,y1,0),iso(x0,y1,0), shade(b.color,0.78));
  quad(iso(x1,y0,h),iso(x1,y1,h),iso(x1,y1,0),iso(x1,y0,0), shade(b.color,0.6));

  if(b.roof==='pitch'){
    const ridge=h+9, mx=(x0+x1)/2;
    const rA=iso(mx,y0,ridge), rB=iso(mx,y1,ridge);
    quad(iso(x0,y0,h),rA,rB,iso(x0,y1,h), shade(b.roofCol,1.04));
    quad(iso(x1,y0,h),rA,rB,iso(x1,y1,h), shade(b.roofCol,0.78));
  } else {
    quad(iso(x0,y0,h),iso(x1,y0,h),iso(x1,y1,h),iso(x0,y1,h), shade(b.color,1.06));
    ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=1;
    const r1=iso(x0,y0,h),r2=iso(x1,y0,h),r3=iso(x1,y1,h),r4=iso(x0,y1,h);
    ctx.beginPath();ctx.moveTo(r1.x,r1.y);ctx.lineTo(r2.x,r2.y);ctx.lineTo(r3.x,r3.y);ctx.lineTo(r4.x,r4.y);ctx.closePath();ctx.stroke();
  }

  // shop awning band on the south face
  if(b.use==='com'&&!b.landmark){
    quad(iso(x0,y1,9),iso(x1,y1,9),iso(x1,y1,3),iso(x0,y1,3), shade(b.awn,1));
  }
  // civic: big door + rooftop flag
  if(b.use==='civic'){
    quad(iso(x0+0.3*(x1-x0),y1,12),iso(x0+0.7*(x1-x0),y1,12),
         iso(x0+0.7*(x1-x0),y1,1),iso(x0+0.3*(x1-x0),y1,1),
         shade(b.kind==='fire'?'#f4f1ea':'#8a5a3b',1));
    const fc=iso(b.x+0.5,b.y+0.5,h);
    ctx.strokeStyle=shade('#5a5f6b',1); ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(fc.x,fc.y); ctx.lineTo(fc.x,fc.y-12); ctx.stroke();
    ctx.fillStyle=b.kind==='fire'?'#ff5a52':'#4f9dde';
    ctx.beginPath(); ctx.moveTo(fc.x,fc.y-12); ctx.lineTo(fc.x+8,fc.y-9.5); ctx.lineTo(fc.x,fc.y-7); ctx.closePath(); ctx.fill();
  }

  // windows
  const floors=Math.max(1,Math.round(h/STORY));
  const litP=night>0.35;
  const dayGlass=shade('#cfe3ec',0.9), darkGlass=shade('#2c3550',0.9);
  for(let f=0;f<floors;f++){
    const v0=f*STORY+4, v1=f*STORY+STORY-3;
    if(v1>h-3) break;
    if(b.use==='com'&&f===0&&v0<10) continue; // awning floor
    for(let w=0;w<2;w++){
      const u0=0.18+w*0.42, u1=u0+0.24;
      let lit=litP&&hash(b.x,b.y,f*31+w*7+1)<0.55;
      quad(iso(x0+u0*(x1-x0),y1,v1),iso(x0+u1*(x1-x0),y1,v1),
           iso(x0+u1*(x1-x0),y1,v0),iso(x0+u0*(x1-x0),y1,v0),
           lit?(hash(b.x,b.y,f*13+w)<.5?'#ffd98a':'#ffeec2'):(litP?darkGlass:dayGlass));
      lit=litP&&hash(b.x,b.y,f*47+w*11+2)<0.5;
      quad(iso(x1,y0+u0*(y1-y0),v1),iso(x1,y0+u1*(y1-y0),v1),
           iso(x1,y0+u1*(y1-y0),v0),iso(x1,y0+u0*(y1-y0),v0),
           lit?'#ffd98a':(litP?shade('#222a42',0.9):shade('#bfd6e0',0.9)));
    }
  }
  // roof details
  if(b.landmark){
    const c=iso(b.x+0.5,b.y+0.5,h);
    ctx.strokeStyle=shade('#aab6c6',1); ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(c.x,c.y); ctx.lineTo(c.x,c.y-34); ctx.stroke();
    const blink=(Math.sin(animT*3)+1)/2;
    ctx.fillStyle=`rgba(255,70,70,${0.35+0.65*blink})`;
    ctx.beginPath(); ctx.arc(c.x,c.y-34,2.6,0,Math.PI*2); ctx.fill();
    if(night>0.3){
      const g=ctx.createRadialGradient(c.x,c.y-34,0,c.x,c.y-34,16);
      g.addColorStop(0,`rgba(255,80,80,${0.5*blink*night})`); g.addColorStop(1,'rgba(255,80,80,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(c.x,c.y-34,16,0,Math.PI*2); ctx.fill();
    }
  } else if(b.roof==='unit'){
    const u0=b.x+0.38,u1=b.x+0.62,v0=b.y+0.38,v1=b.y+0.62,uh=h+7;
    quad(iso(u0,v1,uh),iso(u1,v1,uh),iso(u1,v1,h),iso(u0,v1,h),shade('#9aa1ad',0.8));
    quad(iso(u1,v0,uh),iso(u1,v1,uh),iso(u1,v1,h),iso(u1,v0,h),shade('#9aa1ad',0.62));
    quad(iso(u0,v0,uh),iso(u1,v0,uh),iso(u1,v1,uh),iso(u0,v1,uh),shade('#b8bfca',1));
  } else if(b.roof==='garden'){
    const c=iso(b.x+0.5,b.y+0.5,h);
    ctx.fillStyle=shade('#6fae62',1);
    ctx.beginPath(); ctx.ellipse(c.x,c.y,9,4.5,0,0,Math.PI*2); ctx.fill();
  }
  // burning
  if(b.fire){
    const c=iso(b.x+0.5,b.y+0.5,h);
    const g=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,30);
    g.addColorStop(0,'rgba(255,140,40,.45)'); g.addColorStop(1,'rgba(255,140,40,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(c.x,c.y,30,0,Math.PI*2); ctx.fill();
    for(let k=0;k<3;k++){
      const fx=c.x+(k-1)*6, fh=10+6*Math.abs(Math.sin(animT*10+k*2+b.seed*7));
      ctx.fillStyle=k===1?'#ffd23e':'#ff7a2f';
      ctx.beginPath();
      ctx.moveTo(fx-3,c.y); ctx.quadraticCurveTo(fx,c.y-fh*1.4,fx+3,c.y);
      ctx.closePath(); ctx.fill();
    }
    for(let k=0;k<3;k++){
      const ph=(animT*0.5+k/3+b.seed)%1;
      ctx.fillStyle=`rgba(90,95,107,${0.4*(1-ph)})`;
      ctx.beginPath(); ctx.arc(c.x+Math.sin(ph*6+k)*4, c.y-8-ph*26, 3+ph*6,0,Math.PI*2); ctx.fill();
    }
  }
}

function drawTree(tr, animT){
  const sway=Math.sin(animT*1.4+tr.x*3+tr.y)*1.1*tr.s;
  const base=iso(tr.x,tr.y,0);
  ctx.strokeStyle=shade('#7a5b40',0.9); ctx.lineWidth=2.2*tr.s;
  ctx.beginPath(); ctx.moveTo(base.x,base.y); ctx.lineTo(base.x+sway*0.4,base.y-11*tr.s); ctx.stroke();
  const cx=base.x+sway, cy=base.y-15*tr.s;
  ctx.fillStyle=shade(hash(tr.x*7,tr.y*7,2)<.5?'#5da354':'#6db15f',1);
  ctx.beginPath(); ctx.ellipse(cx,cy,8.5*tr.s,7*tr.s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=shade('#7fc06e',1.08);
  ctx.beginPath(); ctx.ellipse(cx-2*tr.s,cy-2.5*tr.s,4.5*tr.s,3.6*tr.s,0,0,Math.PI*2); ctx.fill();
}

}

function drawCar(c, animT){
  const pos=carPos(c), p0=iso(pos.x,pos.y,0);
  const along=Math.hypot(c.dx,c.dy)?[c.dx,c.dy]:[1,0];
  const L=0.26, Wd=0.15;
  const ax=along[0]*L, ay=along[1]*L, bx_=-along[1]*Wd, by_=along[0]*Wd;
  const corners=z=>[
    iso(pos.x-ax-bx_,pos.y-ay-by_,z), iso(pos.x+ax-bx_,pos.y+ay-by_,z),
    iso(pos.x+ax+bx_,pos.y+ay+by_,z), iso(pos.x-ax+bx_,pos.y-ay+by_,z)];
  const lo=corners(2.5), hi=corners(10.5);
  ctx.fillStyle='rgba(20,24,40,.25)';
  ctx.beginPath(); ctx.ellipse(p0.x,p0.y,13,6,0,0,Math.PI*2); ctx.fill();
  quad(hi[3],hi[2],lo[2],lo[3], shade(c.color,0.72));
  quad(hi[1],hi[2],lo[2],lo[1], shade(c.color,0.58));
  quad(hi[0],hi[1],hi[2],hi[3], shade(c.color,1.05));
  const cl=0.13, cw=0.11;
  const cax=along[0]*cl, cay=along[1]*cl, cbx=-along[1]*cw, cby=along[0]*cw;
  const cc=z=>[
    iso(pos.x-cax-cbx,pos.y-cay-cby,z), iso(pos.x+cax-cbx,pos.y+cay-cby,z),
    iso(pos.x+cax+cbx,pos.y+cay+cby,z), iso(pos.x-cax+cbx,pos.y-cay+cby,z)];
  const c1=cc(10.5), c2=cc(16);
  quad(c2[3],c2[2],c1[2],c1[3], shade('#2e3852',0.95));
  quad(c2[1],c2[2],c1[2],c1[1], shade('#2e3852',0.8));
  quad(c2[0],c2[1],c2[2],c2[3], shade(c.color,1.12));
  if(night>0.3&&c.wait<=0){
    const hx=pos.x+along[0]*L, hy=pos.y+along[1]*L;
    const h1=iso(hx-bx_*0.6,hy-by_*0.6,6), h2=iso(hx+bx_*0.6,hy+by_*0.6,6);
    ctx.fillStyle='#fff3c4';
    ctx.beginPath(); ctx.arc(h1.x,h1.y,1.6,0,Math.PI*2); ctx.arc(h2.x,h2.y,1.6,0,Math.PI*2); ctx.fill();
    const fx=pos.x+along[0]*1.0, fy=pos.y+along[1]*1.0;
    const t1=iso(fx-bx_*2.2,fy-by_*2.2,1), t2=iso(fx+bx_*2.2,fy+by_*2.2,1);
    const mid=iso(hx,hy,5);
    const g=ctx.createLinearGradient(mid.x,mid.y,(t1.x+t2.x)/2,(t1.y+t2.y)/2);
    g.addColorStop(0,`rgba(255,240,180,${0.32*night})`); g.addColorStop(1,'rgba(255,240,180,0)');
    quad(iso(hx-bx_,hy-by_,4),iso(hx+bx_,hy+by_,4),t2,t1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fill();
    const tx_=pos.x-along[0]*L, ty_=pos.y-along[1]*L;
    const tl=iso(tx_,ty_,6);
    ctx.fillStyle='rgba(255,80,80,.8)';
    ctx.beginPath(); ctx.arc(tl.x,tl.y,1.4,0,Math.PI*2); ctx.fill();
  }
  c.sx=p0.x; c.sy=p0.y-12;
}

function drawPed(p, animT){
  const pos=pedPos(p), g=iso(pos.x,pos.y,0);
  const bob=Math.abs(Math.sin(animT*7+p.bob))*(p.idle>0?0.3:1.6);
  ctx.fillStyle='rgba(20,24,40,.22)';
  ctx.beginPath(); ctx.ellipse(g.x,g.y,3.4,1.7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=shade(p.shirt,0.96);
  const bh=8;
  ctx.beginPath();
  ctx.moveTo(g.x-2.4,g.y-1-bob); ctx.lineTo(g.x+2.4,g.y-1-bob);
  ctx.lineTo(g.x+1.9,g.y-1-bh-bob); ctx.lineTo(g.x-1.9,g.y-1-bh-bob);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle=shade(p.skin,1);
  ctx.beginPath(); ctx.arc(g.x,g.y-1-bh-2.6-bob,2.6,0,Math.PI*2); ctx.fill();
  p.sx=g.x; p.sy=g.y-16-bob;
}

// ---------- sky ----------
function drawSky(h, animT){
  const [top,hor]=skyAt(h);
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,top); g.addColorStop(1,hor);
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
  if(night>0.05){
    ctx.fillStyle='#fff';
    for(const s of stars){
      ctx.globalAlpha=night*(0.35+0.65*Math.abs(Math.sin(animT*0.8+s.tw)));
      ctx.fillRect(s.x*CW,s.y*CH,s.s,s.s);
    }
    ctx.globalAlpha=1;
  }
  function orb(hh,fill,glow,r){
    if(hh<5.4||hh>19.6) return;
    const u=(hh-5.4)/(19.6-5.4);
    const x=lerp(CW*0.08,CW*0.92,u);
    const y=CH*0.52-Math.sin(u*Math.PI)*CH*0.4;
    const gg=ctx.createRadialGradient(x,y,0,x,y,r*4);
    gg.addColorStop(0,glow); gg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(x,y,r*4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=fill; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  orb(h,'#ffe9a8','rgba(255,225,150,.5)',26);
  orb((h+12)%24,'#e8ecf4','rgba(220,228,255,.3)',16);
  const ca=(1-night)*0.75;
  if(ca>0.03){
    ctx.fillStyle=`rgba(255,255,255,${ca*0.8})`;
    for(const cl of clouds){
      const x=cl.x*CW, y=cl.y*CH, s=cl.s;
      ctx.beginPath();
      ctx.ellipse(x,y,46*s,14*s,0,0,Math.PI*2);
      ctx.ellipse(x+30*s,y+4*s,30*s,11*s,0,0,Math.PI*2);
      ctx.ellipse(x-32*s,y+5*s,26*s,10*s,0,0,Math.PI*2);
      ctx.fill();
    }
  }
}

// ---------- render frame ----------
let hoverAgent=null;
function render(animT){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const h=hourNow();
  night=nightAt(h);
  warm=clamp(bell(h,6.3,1.0)+bell(h,18.7,1.1),0,1);
  const newKey=((night*40)|0)+'-'+((warm*20)|0);
  if(newKey!==ambKey){ ambKey=newKey; if(shadeCache.size>4000) shadeCache.clear(); }

  drawSky(h, animT);
  ctx.save(); applyCam();

  const rng=visibleRange();
  drawGround(rng, animT);

  // build ghost
  if(tool!=='inspect'&&hoverTile&&inB(hoverTile.x,hoverTile.y)){
    const ok=canPlace(tool,hoverTile.x,hoverTile.y);
    const col=ok?'103,209,138':'255,107,94';
    diamond(hoverTile.x,hoverTile.y,0,`rgba(${col},.3)`);
    ctx.strokeStyle=`rgba(${col},.95)`; ctx.lineWidth=2;
    const p1=iso(hoverTile.x,hoverTile.y,0),p2=iso(hoverTile.x+1,hoverTile.y,0),
          p3=iso(hoverTile.x+1,hoverTile.y+1,0),p4=iso(hoverTile.x,hoverTile.y+1,0);
    ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.lineTo(p3.x,p3.y);ctx.lineTo(p4.x,p4.y);ctx.closePath();ctx.stroke();
  }
  // service coverage rings
  if(tool==='fire'||tool==='school'){
    const Rr=tool==='fire'?FIRE_R:SCHOOL_R;
    const col=tool==='fire'?'255,90,82':'79,157,222';
    ctx.lineWidth=1.5;
    for(const s of stationsOf(tool)){
      const c=iso(s.x+0.5,s.y+0.5,0);
      ctx.fillStyle=`rgba(${col},.08)`; ctx.strokeStyle=`rgba(${col},.5)`;
      ctx.beginPath(); ctx.ellipse(c.x,c.y,Rr*TW*1.414,Rr*TH*1.414,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    }
    if(hoverTile&&inB(hoverTile.x,hoverTile.y)&&canPlace(tool,hoverTile.x,hoverTile.y)){
      const c=iso(hoverTile.x+0.5,hoverTile.y+0.5,0);
      ctx.strokeStyle=`rgba(${col},.8)`; ctx.setLineDash([6,5]);
      ctx.beginPath(); ctx.ellipse(c.x,c.y,Rr*TW*1.414,Rr*TH*1.414,0,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  const items=[];
  const inR=(x,y)=>x>=rng.x0&&x<=rng.x1&&y>=rng.y0&&y<=rng.y1;
  for(let x=rng.x0;x<=rng.x1;x++) for(let y=rng.y0;y<=rng.y1;y++)
    if(hasProcTree(x,y)){ const tr=procTreeObj(x,y); items.push({d:tr.x+tr.y, f:()=>drawTree(tr,animT)}); }
  for(const b of buildings) if(inR(b.x,b.y)) items.push({d:b.x+b.y+1, f:()=>drawBuilding(b,animT)});
  for(const bk of blocks)   if(inR(bk.x,bk.y)) items.push({d:bk.x+bk.y+1, f:()=>drawBlock(bk)});
  for(const tr of trees)    if(inR(tr.x,tr.y)) items.push({d:tr.x+tr.y, f:()=>drawTree(tr,animT)});
  for(const l of lamps)     if(inR(l.x,l.y)) items.push({d:l.x+l.y, f:()=>drawLamp(l)});
  for(const bn of benches)  if(inR(bn.x,bn.y)) items.push({d:bn.x+bn.y, f:()=>drawBench(bn)});
  if(fountain) items.push({d:fountain.x+fountain.y, f:()=>drawFountain(animT)});
  for(const it of INTERS)   if(inR(it.x,it.y)) items.push({d:it.x+it.y+0.2, f:()=>drawTrafficLight(it,simClock)});
  for(const c of cars){ const p=carPos(c); items.push({d:p.x+p.y, f:()=>drawCar(c,animT)}); }
  for(const p of peds){ const q=pedPos(p); items.push({d:q.x+q.y, f:()=>drawPed(p,animT)}); }
  items.sort((a,b)=>a.d-b.d);
  for(const it of items) it.f();

  if(cam.z>=1.7){
    ctx.font='700 9px ui-rounded, "Segoe UI", sans-serif';
    ctx.textAlign='center';
    const label=(x,y,txt)=>{
      const w=ctx.measureText(txt).width+8;
      ctx.fillStyle='rgba(18,21,38,.78)';
      ctx.beginPath(); ctx.roundRect(x-w/2,y-9,w,12,6); ctx.fill();
      ctx.fillStyle='#f4ede0'; ctx.fillText(txt,x,y);
    };
    for(const c of cars) label(c.sx,c.sy-6,c.name);
    for(const p of peds) label(p.sx,p.sy-2,p.name);
    ctx.textAlign='start';
  }
  ctx.restore();

  if(hoverAgent&&tool==='inspect'){
    const s=worldToScreen(hoverAgent.sx, hoverAgent.sy+(hoverAgent.kindTag?12:16));
    ctx.strokeStyle='#ffce6b'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(s.x,s.y,14*cam.z,7*cam.z,0,0,Math.PI*2); ctx.stroke();
  }
}

// ---------- HUD ----------
const $=id=>document.getElementById(id);
const elCash=$('cash'), elClock=$('clock'), elPhase=$('phase'),
      elPop=$('sPop'), elJobs=$('sJobs'), elHap=$('sHap'), elCars=$('sCars'), tip=$('tip');
function phaseName(h){
  if(h<5)return'Deep night'; if(h<7)return'Dawn'; if(h<11)return'Morning';
  if(h<14)return'Midday'; if(h<17.5)return'Afternoon'; if(h<19.5)return'Dusk';
  if(h<22)return'Evening'; return'Night';
}
let lastHour=START_HOUR;
function updateHUD(){
  const h=hourNow();
  if(h<lastHour-12){ day++; economyTick(); }
  lastHour=h;
  const hh=String(h|0).padStart(2,'0'), mm=String(((h%1)*60)|0).padStart(2,'0');
  elClock.textContent=hh+':'+mm;
  elPhase.textContent=phaseName(h)+' · Day '+day;
  checkMilestones();
  document.getElementById('rank').textContent=RANKS[rankIdx][1]+(mode==='creative'?' · creative v0.5':' · mayor mode v0.5');
  elCash.textContent = mode==='creative' ? '∞ creative' : '$'+cash.toLocaleString();
  elCash.classList.toggle('broke', mode!=='creative'&&cash<0);
  elPop.textContent=stats.pop.toLocaleString();
  elJobs.textContent=stats.jobs.toLocaleString();
  elHap.textContent=Math.round(stats.happy*100)+'%';
  elCars.textContent=cars.filter(c=>c.wait<=0).length+' / '+cars.length;
  document.querySelector('#dR .bfill').style.width=(stats.dR*100)+'%';
  document.querySelector('#dC .bfill').style.width=(stats.dC*100)+'%';
  document.querySelector('#dG .bfill').style.width=(stats.dG*100)+'%';
}
function toast(msg, kind){
  const t=document.createElement('div');
  t.className='toast'+(kind?' '+kind:'');
  t.textContent=msg;
  $('toasts').appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

// ---------- save / load ----------
function exportCity(){
  const data={v:4, mode, cash, day, simClock, eventsOn, rankIdx,
    edits:[...edits], removedTrees:[...removedTrees],
    parks:[...parkSet], scorch:[...scorch],
    blocks:blocks.map(b=>({x:b.x,y:b.y,colors:[...b.colors]})),
    buildings:buildings.map(b=>{const o={...b}; o.fire=null; return o;}),
    trees:trees.map(t=>({x:t.x,y:t.y,s:t.s}))};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='aster-bay-day'+day+'.json';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  toast('City exported','ok');
}
function importCity(data){
  if(!data||(data.v!==2&&data.v!==3&&data.v!==4)) throw new Error('bad save');
  edits.clear(); removedTrees.clear();
  if(data.v===4){
    for(const [k,t] of data.edits) edits.set(k,t);
    for(const k of (data.removedTrees||[])) removedTrees.add(k);
    setMode(data.mode||'mayor');
  } else {
    // v2/v3: dense 33×33 grid — convert to sparse edits over terrain
    if(data.grid!==GRID) throw new Error('bad save');
    for(let x=0;x<GRID;x++) for(let y=0;y<GRID;y++){
      const t=data.T[x][y];
      if(t&&t!=='edge') setTile(x,y,t);
    }
    setMode('mayor');
  }
  buildings.length=0; bldMap.clear();
  for(const b of data.buildings){ b.fire=null; if(b.kind===undefined) b.kind=null; addBuilding(b); }
  trees.length=0; treeMap.clear();
  for(const t of data.trees) addTree(t);
  blocks.length=0; blockMap.clear();
  for(const bk of (data.blocks||[])){ blocks.push(bk); blockMap.set(tkey(bk.x,bk.y),bk); }
  parkSet.clear(); for(const k of (data.parks||[])) parkSet.add(k);
  scorch.clear(); for(const k of (data.scorch||[])) scorch.add(k);
  if(data.eventsOn!==undefined) setEvents(data.eventsOn);
  cash=data.cash; day=data.day; simClock=data.simClock; lastHour=hourNow();
  rebuildLights();
  cars.length=0; peds.length=0;
  recompute();
  rankIdx = data.rankIdx!==undefined ? data.rankIdx : currentRank();
  adjustAgents(); updateHUD();
  toast('City loaded — welcome back, Mayor','ok');
}
function currentRank(){
  let idx=0;
  for(let i=0;i<RANKS.length;i++) if(stats.pop>=RANKS[i][0]) idx=i;
  return idx;
}
function setEvents(v){
  eventsOn=v;
  document.getElementById('evLbl').innerHTML='Fires: '+(eventsOn?'on':'off')+'<small>random events</small>';
}
document.getElementById('bEvents').onclick=()=>{
  setEvents(!eventsOn);
  toast(eventsOn?'Random fires enabled':'Calm mode — no random fires','ok');
};
function setMode(m){
  mode=m;
  document.getElementById('modeLbl').innerHTML = mode==='creative'
    ? 'Creative mode<small>everything is free</small>'
    : 'Mayor mode<small>tap for creative</small>';
  document.getElementById('bMode').classList.toggle('on', mode==='creative');
  updateHUD();
}
document.getElementById('bMode').onclick=()=>{
  setMode(mode==='creative'?'mayor':'creative');
  toast(mode==='creative'
    ? '🎨 Creative mode — build anything, everything is free'
    : '🏛️ Mayor mode — budgets are back on','ok');
};
function applyBootParams(){
  const m=new URLSearchParams(location.search).get('mode');
  if(m==='creative'||m==='mayor') setMode(m);
}
// block color palette
(function buildPalette(){
  const pal=document.getElementById('palette');
  BLOCK_COLORS.forEach(c=>{
    const b=document.createElement('button');
    b.style.background=c;
    if(c===blockColor) b.classList.add('on');
    b.onclick=()=>{
      blockColor=c;
      pal.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
    };
    pal.appendChild(b);
  });
})();
$('bSave').onclick=exportCity;
$('bLoad').onclick=()=>$('fileIn').click();
$('fileIn').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ importCity(JSON.parse(rd.result)); }catch(err){ toast('Couldn\u2019t read that save file','err'); } };
  rd.readAsText(f);
  e.target.value='';
});

// ---------- input ----------
let dragging=false, dragMoved=false, lx=0, ly=0, tipTimer=null;
const activePtrs=new Set();
function showTip(html,x,y){
  tip.innerHTML=html; tip.style.display='block';
  tip.style.left=Math.min(x+14, CW-200)+'px'; tip.style.top=(y+10)+'px';
  clearTimeout(tipTimer);
  tipTimer=setTimeout(()=>{ tip.style.display='none'; }, 2600);
}
function bldLabel(b){
  const burn=b.fire?' · 🔥 on fire!':'';
  if(b.landmark) return '🗼 <b>Aster Spire</b> · city landmark'+burn;
  if(b.use==='res') return `🏠 <b>Housing</b> · ${b.stories} ${b.stories>1?'storeys':'storey'} · ${b.capacity} residents${burn}`;
  if(b.use==='com') return `🏬 <b>Shop</b> · ${b.jobs} jobs${burn}`;
  if(b.kind==='fire') return '🚒 <b>Fire station</b> · douses fires within '+FIRE_R+' tiles'+burn;
  return '🏫 <b>School</b> · happier residents within '+SCHOOL_R+' tiles'+burn;
}
function nearestAgent(mx,my,maxD){
  let best=null, bd=maxD;
  const test=(a,kind)=>{
    const s=worldToScreen(a.sx,a.sy);
    const d=Math.hypot(s.x-mx, s.y-my);
    if(d<bd){ bd=d; best={a,kind}; }
  };
  for(const c of cars) test(c,'car');
  for(const p of peds) test(p,'ped');
  return best;
}
function agentTipHTML(best){
  return best.kind==='car'
    ? `🚗 <b>${best.a.name}</b> · ${best.a.kind}${best.a.wait>0?' · waiting at the light':''}`
    : `🚶 <b>${best.a.name}</b> · ${best.a.flavor}`;
}
cv.addEventListener('pointerdown', e=>{
  activePtrs.add(e.pointerId);
  dragging=true; dragMoved=false; lx=e.clientX; ly=e.clientY;
  cv.classList.add('dragging'); cv.setPointerCapture(e.pointerId);
});
cv.addEventListener('pointermove', e=>{
  if(dragging && activePtrs.size<=1){
    cam.px+=e.clientX-lx; cam.py+=e.clientY-ly;
    if(Math.abs(e.clientX-lx)+Math.abs(e.clientY-ly)>3) dragMoved=true;
    lx=e.clientX; ly=e.clientY;
  }
  hoverTile=screenToTile(e.clientX,e.clientY);
  if(tool!=='inspect'){ hoverAgent=null; if(!tipTimer) tip.style.display='none'; return; }
  if(e.pointerType!=='mouse') return; // touch uses tap-to-inspect
  const best=nearestAgent(e.clientX,e.clientY,20);
  if(best&&!dragging){
    hoverAgent=best.a; hoverAgent.kindTag=best.kind==='car';
    clearTimeout(tipTimer); tipTimer=null;
    tip.style.display='block';
    tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+10)+'px';
    tip.innerHTML=agentTipHTML(best);
  } else if(!tipTimer){ hoverAgent=null; tip.style.display='none'; }
});
cv.addEventListener('pointerup', e=>{
  activePtrs.delete(e.pointerId);
  cv.classList.remove('dragging');
  if(dragging&&!dragMoved){
    const t=screenToTile(e.clientX,e.clientY);
    if(tool!=='inspect'){
      tryPlace(t.x,t.y);
    } else {
      const best=nearestAgent(e.clientX,e.clientY,26);
      if(best) showTip(agentTipHTML(best), e.clientX, e.clientY);
      else if(bldMap.has(tkey(t.x,t.y)))
        showTip(bldLabel(bldMap.get(tkey(t.x,t.y))), e.clientX, e.clientY);
      else if(blockMap.has(tkey(t.x,t.y))){
        const bk=blockMap.get(tkey(t.x,t.y));
        showTip('🧱 <b>Block tower</b> · '+bk.colors.length+' block'+(bk.colors.length>1?'s':'')+' high', e.clientX, e.clientY);
      }
      else tip.style.display='none';
    }
  }
  dragging=false;
});
cv.addEventListener('pointercancel', e=>{ activePtrs.delete(e.pointerId); dragging=false; cv.classList.remove('dragging'); });
cv.addEventListener('pointerleave', ()=>{ if(!tipTimer) tip.style.display='none'; hoverAgent=null; hoverTile=null; });

function zoomAt(factor,sx,sy){
  const nz=clamp(cam.z*factor,0.4,3.2);
  const k=nz/cam.z;
  cam.px=sx-CW/2-(sx-CW/2-cam.px)*k;
  cam.py=sy-CH/2-(sy-CH/2-cam.py)*k;
  cam.z=nz;
}
cv.addEventListener('wheel', e=>{
  e.preventDefault();
  zoomAt(e.deltaY<0?1.12:0.89, e.clientX, e.clientY);
},{passive:false});

$('bIn').onclick=()=>zoomAt(1.25,CW/2,CH/2);
$('bOut').onclick=()=>zoomAt(0.8,CW/2,CH/2);
$('bHome').onclick=()=>{ cam.px=0; cam.py=40; cam.z=Math.min(CW,CH)>700?1.05:0.7; };
const bPause=$('bPause');
function setPause(v){
  paused=v;
  bPause.textContent=paused?'▶ Resume':'⏸ Pause';
  bPause.classList.toggle('on',paused);
}
bPause.onclick=()=>setPause(!paused);
document.querySelectorAll('.spd').forEach(b=>{
  b.onclick=()=>{
    speed=+b.dataset.s;
    document.querySelectorAll('.spd').forEach(x=>x.classList.toggle('on',x===b));
    if(paused) setPause(false);
  };
});
function setTool(t){
  tool=t;
  document.querySelectorAll('.tool').forEach(x=>x.classList.toggle('on',x.dataset.t===t));
  cv.classList.toggle('building',t!=='inspect');
  document.getElementById('palette').classList.toggle('show', t==='block');
}
document.querySelectorAll('.tool').forEach(b=>{ b.onclick=()=>setTool(b.dataset.t); });
window.addEventListener('keydown', e=>{
  if(e.code==='Space'){ e.preventDefault(); setPause(!paused); }
  if(e.key==='+'||e.key==='=') zoomAt(1.2,CW/2,CH/2);
  if(e.key==='-'||e.key==='_') zoomAt(0.83,CW/2,CH/2);
  if(e.key==='Escape') setTool('inspect');
});
let pinchD=0;
cv.addEventListener('touchstart', e=>{ if(e.touches.length===2){
  pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
}},{passive:true});
cv.addEventListener('touchmove', e=>{ if(e.touches.length===2){
  const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  const mx=(e.touches[0].clientX+e.touches[1].clientX)/2, my=(e.touches[0].clientY+e.touches[1].clientY)/2;
  if(pinchD>0) zoomAt(d/pinchD,mx,my);
  pinchD=d;
}},{passive:true});

// ---------- boot & main loop ----------
recompute();
rankIdx=currentRank();
adjustAgents();
applyBootParams();
if(mode==='creative') toast('🎨 Creative mode — build anything, everything is free', 'ok');
let prev=performance.now(), animT=0, hudTick=0;
function frame(now){
  let dt=Math.min((now-prev)/1000,0.05); prev=now;
  animT+=dt;
  if(!paused){
    const sdt=dt*speed;
    simClock+=sdt;
    updateCars(sdt,simClock);
    updatePeds(sdt);
    updateFires(sdt);
  }
  render(animT);
  hudTick+=dt;
  if(hudTick>0.25){ hudTick=0; updateHUD(); }
  requestAnimationFrame(frame);
}
updateHUD();
requestAnimationFrame(frame);
</script>
